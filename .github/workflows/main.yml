name: APK AzurLane JMBQ Build Work

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: '区服名称-必须（必须是英文字母！例如 Bilibili，台服和外服请使用XAPK AzurLane JMBQ Build Work）'
        required: true
        type: string
        default: ''

      download_url:
        description: 'Google Drive 链接或 APK 直链'
        required: true
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：设置 Java
      - name: Setup Java JDK
        uses: actions/setup-java@v3.3.0
        with:
          java-version: "17"
          distribution: "adopt"

      # 步骤3：设置 Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 步骤4：安装 Android build-tools
      - name: Install build-tools
        run: |
          yes | sdkmanager --install "build-tools;35.0.0"

      # 步骤5：安装 Python + gdown
      - name: Install gdown
        run: |
          python3 -m pip install --upgrade pip
          pip install gdown

      # 步骤6：下载 APK
      - name: Download APK
        run: |
          echo "开始下载 APK..."

          gdown "${{ github.event.inputs.download_url }}" -O input.apk

          echo "下载完成，检查文件..."

          ls -lh input.apk

          FILE_TYPE=$(file input.apk)

          echo "$FILE_TYPE"

          if echo "$FILE_TYPE" | grep -i "HTML"; then
            echo "错误：下载到的是 HTML 页面，不是 APK 文件"
            exit 1
          fi

      # 步骤7：执行构建
      - name: Build APK
        run: |
          chmod +x merge_build.sh

          ./merge_build.sh \
          "${{ github.event.inputs.server_name }}" \
          "input.apk"

      # 步骤8：创建 Release
      - name: Release and Upload Assets
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ env.JMBQ_VERSION }}-APK"

          name: "AzurLane JMBQ ${{ env.JMBQ_VERSION }} Build APK"

          artifacts: "${{ github.event.inputs.server_name }}-V.${{ env.VERSION }}.7z.*"

          allowUpdates: true

          body: |
            <details>
              <summary>中文安装说明 - 点击展开</summary>

              1. 下载对应服务器名称的所有 7z.00* 分卷文件

              2. 只需要解压 XXX.7z.001 即可

              3. 在解压后的目录中安装 APK

            </details>

            <details>
              <summary>English Installation Instructions - Click to expand</summary>

              1. Download all files ending with 7z.00* for your server

              2. Extract only the XXX.7z.001 file

              3. Install the APK from the extracted folder

            </details>
```
